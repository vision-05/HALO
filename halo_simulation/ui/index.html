<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Override if your API is not on this host:port (see haloApiOrigin in script). -->
  <meta name="halo-api-origin" content="" />
  <title>HALO — Live simulation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --coral: #f78166;
      --blue: #79c0ff;
      --green: #3fb950;
      --amber: #d29922;
      --red: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
    }
    #topbar {
      display: flex; align-items: center; gap: 1rem; padding: 0.5rem 1rem;
      background: var(--panel); border-bottom: 1px solid #30363d; flex-wrap: wrap;
    }
    #topbar h1 { margin: 0; font-size: 1.1rem; letter-spacing: 0.05em; }
    #topbar label { font-size: 0.8rem; color: var(--muted); }
    #topbar input, #topbar select { background: #21262d; border: 1px solid #30363d; color: var(--text); padding: 0.25rem 0.5rem; border-radius: 4px; }
    #topbar button {
      background: var(--accent); color: #fff; border: none; padding: 0.4rem 0.9rem; border-radius: 4px; cursor: pointer; font-weight: 600;
    }
    #topbar button#stop { background: #484f58; }
    #simTime { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--green); }
    #speedNote { font-size: 0.75rem; color: var(--muted); max-width: 18rem; }
    #layout {
      display: grid; grid-template-columns: 25% 40% 35%; height: calc(100vh - 52px);
    }
    #colLeft { border-right: 1px solid #30363d; overflow-y: auto; padding: 0.5rem; }
    #colMid { display: flex; flex-direction: column; border-right: 1px solid #30363d; min-height: 0; }
    #colRight { overflow-y: auto; padding: 0.5rem; }
    .agent-card {
      background: var(--panel); border-radius: 8px; padding: 0.6rem; margin-bottom: 0.5rem;
      border: 1px solid #30363d; position: relative;
    }
    .agent-card h3 { margin: 0 0 0.25rem 0; font-size: 0.85rem; display: flex; align-items: center; gap: 0.35rem; }
    .badge { font-size: 0.65rem; padding: 0.1rem 0.35rem; border-radius: 4px; text-transform: uppercase; }
    .badge.person { background: #23863633; color: #3fb950; }
    .badge.device { background: #388bfd33; color: var(--accent); }
    .badge.specialist { background: #a371f733; color: #d2a8ff; }
    .status-badge {
      display: inline-block; font-size: 0.65rem; padding: 0.15rem 0.4rem; border-radius: 4px; margin-top: 0.25rem;
    }
    .st-idle { background: #30363d; color: var(--muted); }
    .st-negotiating { background: #388bfd44; color: var(--accent); }
    .st-resolved { background: #23863644; color: var(--green); }
    .st-failed { background: #f8514944; color: #f85149; }
    .st-away { background: #484f58; color: #8b949e; }
    .st-home { background: #23863633; color: #3fb950; }
    .pulse-dot {
      position: absolute; top: 0.5rem; right: 0.5rem; width: 10px; height: 10px; border-radius: 50%;
      background: #30363d; transition: background 0.2s;
    }
    .pulse-dot.active { background: var(--accent); animation: pulse 1s ease-out 1; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(88, 166, 255, 0.7); }
      100% { box-shadow: 0 0 0 12px rgba(88, 166, 255, 0); }
    }
    .card-detail { font-size: 0.75rem; color: var(--muted); line-height: 1.35; margin-top: 0.35rem; }
    #floorWrap { flex: 1; min-height: 200px; padding: 0.5rem; background: #0d1117; }
    #floorWrap svg { width: 100%; height: 100%; max-height: 42vh; }
    .room { fill: #21262d; stroke: #30363d; stroke-width: 2; }
    .room-label { fill: var(--muted); font-size: 11px; }
    .thermo-circle { stroke: #fff; stroke-width: 2; }
    .dw-rect { rx: 4; }
    .light-dot { stroke: #30363d; stroke-width: 1; }
    .person-dot { stroke: #fff; stroke-width: 2; }
    .negot-line { stroke: var(--accent); stroke-width: 2; stroke-dasharray: 6 4; fill: none; animation: dash 0.8s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: -20; } }
    #feed {
      flex: 0 0 38%; min-height: 120px; border-top: 1px solid #30363d; overflow-y: auto; padding: 0.35rem;
      background: #0d1117; font-size: 0.72rem;
    }
    .feed-row {
      padding: 0.35rem 0.45rem; margin-bottom: 0.25rem; background: var(--panel); border-radius: 4px;
      border-left: 3px solid #30363d; animation: fadeIn 0.35s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
    .feed-row .time { color: var(--muted); }
    .pill { display: inline-block; padding: 0.1rem 0.35rem; border-radius: 3px; font-size: 0.65rem; margin: 0 0.2rem; }
    .metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.35rem; margin-bottom: 0.5rem; }
    .metric-card { background: var(--panel); border-radius: 6px; padding: 0.45rem; text-align: center; border: 1px solid #30363d; }
    .metric-card .v { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    .metric-card .l { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; }
    .chart-box { background: var(--panel); border-radius: 8px; padding: 0.5rem; margin-bottom: 0.5rem; border: 1px solid #30363d; height: 220px; position: relative; }
    .chart-box.tall { height: 180px; }
    .chart-box.weather {
      height: 300px;
      display: flex;
      flex-direction: column;
      min-height: 300px;
    }
    .chart-box.weather .weather-chart-head {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.35rem;
      flex-wrap: wrap; gap: 0.35rem;
      flex-shrink: 0;
    }
    .chart-box.weather .weather-chart-wrap {
      flex: 1;
      min-height: 200px;
      position: relative;
      width: 100%;
    }
    .chart-box.weather .weather-chart-head span { font-size: 0.78rem; color: var(--muted); }
    .chart-box.weather button {
      font-size: 0.72rem; padding: 0.2rem 0.55rem; border-radius: 4px; border: 1px solid #30363d;
      background: #21262d; color: var(--text); cursor: pointer;
    }
    .chart-box.weather button:hover { border-color: var(--accent); color: var(--accent); }
    #runStatus {
      font-size: 0.75rem; color: var(--muted); max-width: 28rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #runStatus.done { color: var(--green); }
    .api-dot {
      width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0;
      background: #30363d;
    }
    .live-row { display: inline-flex; align-items: center; gap: 0.35rem; font-size: 0.78rem; color: var(--muted); }
    .weather-source-pill {
      font-size: 0.6rem; font-weight: 700; padding: 0.12rem 0.4rem; border-radius: 4px;
      margin-left: 0.35rem; vertical-align: middle; letter-spacing: 0.04em;
    }
    .weather-source-pill.live { background: #22c55e33; color: #22c55e; }
    .weather-source-pill.synth { background: #484f58; color: #9ca3af; }
  </style>
</head>
<body>
  <div id="topbar">
    <h1>HALO</h1>
    <label>Scenario
      <select id="scenario">
        <option value="temperature_conflict">Temperature Conflict</option>
        <option value="carbon_spike">Carbon Spike</option>
        <option value="device_failure">Device Failure</option>
      </select>
    </label>
    <label>Days <input type="number" id="days" value="14" min="1" max="365" style="width:4rem" /></label>
    <label>Seed <input type="number" id="seed" value="42" style="width:5rem" /></label>
    <span class="live-row">
      <label style="display:inline-flex;align-items:center;gap:0.35rem;cursor:pointer;">
        <input type="checkbox" id="liveDataToggle" />
        Live Data (London)
      </label>
      <span class="api-dot" id="carbon-dot" title="Carbon API"></span>
      <span class="api-dot" id="weather-dot" title="Weather API"></span>
    </span>
    <span id="api-temp" style="font-size:0.75rem;color:var(--muted);"></span>
    <span id="api-carbon" style="font-size:0.75rem;color:var(--muted);margin-left:0.5rem;"></span>
    <button type="button" id="run">Run</button>
    <button type="button" id="stop">Stop</button>
    <span id="simTime">Sim: —:—</span>
    <span id="runStatus" title=""></span>
    <span id="speedNote">Events are buffered and rendered every 100ms so bursts do not freeze the UI.</span>
  </div>
  <div id="layout">
    <div id="colLeft"></div>
    <div id="colMid">
      <div id="floorWrap"></div>
      <div id="feed"></div>
    </div>
    <div id="colRight">
      <div class="metrics-row">
        <div class="metric-card"><div class="l">Negotiations</div><div class="v" id="mNeg">0</div></div>
        <div class="metric-card"><div class="l">Convergence %</div><div class="v" id="mConv">—</div></div>
        <div class="metric-card"><div class="l">Mean satisfaction</div><div class="v" id="mSat">—</div></div>
        <div class="metric-card"><div class="l">Carbon (latest)</div><div class="v" id="mCarb">—</div></div>
      </div>
      <div class="chart-box"><canvas id="chartLine"></canvas></div>
      <div class="chart-box tall"><canvas id="chartBar"></canvas></div>
      <div class="chart-box weather">
        <div class="weather-chart-head">
          <span id="weatherChartTitle">Open-Meteo hourly · London (full forecast window)</span>
          <button type="button" id="weatherChartRefresh">Refresh</button>
        </div>
        <div class="weather-chart-wrap">
          <canvas id="chartWeather"></canvas>
        </div>
        <div id="weatherChartErr" style="display:none;font-size:0.72rem;color:#f85149;margin-top:0.25rem;"></div>
      </div>
    </div>
  </div>
  <script>
    function haloApiOrigin() {
      const m = document.querySelector('meta[name="halo-api-origin"]');
      if (m && String(m.content).trim()) return String(m.content).trim().replace(/\/$/, '');
      // Opening index.html from disk — default to HALO uvicorn port (see server.py header).
      if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000';
      const host = (window.location.hostname || '').toLowerCase();
      const looksLikeEditorPreview =
        /vscode-webview|\.vscode-cdn\.net|github\.dev|\.app\.github\.dev|cursor|webview/i.test(host);
      // Preview UIs are not served by FastAPI; API still runs on localhost (often :8004 in some setups).
      if (looksLikeEditorPreview) return 'http://127.0.0.1:8004';
      // Page is real http(s) (e.g. http://localhost:8000) — use same host:port as the UI.
      if (window.location.protocol === 'http:' || window.location.protocol === 'https:') return '';
      return '';
    }
    function haloApiUrl(path) {
      if (!path.startsWith('/')) path = '/' + path;
      const o = haloApiOrigin();
      return o ? o + path : path;
    }

    const MIN_PER_DAY = 1440;
    const AGENTS = [
      { id: 'person_alice', name: 'Alice', type: 'person', role: 'alice' },
      { id: 'person_bob', name: 'Bob', type: 'person', role: 'bob' },
      { id: 'device_thermostat', name: 'Thermostat', type: 'device', role: 'thermostat' },
      { id: 'device_dishwasher', name: 'Dishwasher', type: 'device', role: 'dishwasher' },
      { id: 'specialist_carbon', name: 'Grid Carbon', type: 'specialist', role: 'carbon' },
      { id: 'specialist_weather', name: 'Weather', type: 'specialist', role: 'weather' },
    ];
    const SCENARIO_AGENTS = {
      temperature_conflict: ['person_alice','person_bob','device_thermostat','specialist_carbon','specialist_weather'],
      carbon_spike: ['person_alice','person_bob','device_thermostat','device_dishwasher','specialist_carbon','specialist_weather'],
      device_failure: ['person_alice','person_bob','device_thermostat','device_shower','specialist_carbon','specialist_weather'],
    };

    const state = {
      agents: Object.fromEntries(AGENTS.map(a => [a.id, {
        status: 'idle', detail: '—', pulse: false,
      }])),
      alice: { home: true, x: 180, y: 140, pref: 22 },
      bob: { home: true, x: 220, y: 140, pref: 19 },
      thermo: { setpoint: 20, device_state: 'idle', outdoorHeatingOff: false },
      dishwasher: { state: 'idle' },
      carbon: { value: null, level: '—' },
      weather: { temp: null },
      weatherChartMode: 'forecast',
      lastWeatherSimTs: null,
      weatherSimNotes: [],
      weatherForecastSimCache: null,
      maxSimMinutesForWeatherChart: 0,
      simEpochUtcMs: null,
      weatherSimFcIdxPerPoint: [],
      shower: { state: 'idle' },
      negotiationLine: null,
      metrics: { neg: 0, convSum: 0, convN: 0, satSum: 0, satN: 0 },
      currentScenario: 'temperature_conflict',
    };

    function _numOrNaN(v) {
      if (v === null || v === undefined) return NaN;
      const n = Number(v);
      return Number.isFinite(n) ? n : NaN;
    }

    function fmtTime(mins) {
      const m = Math.floor(mins % MIN_PER_DAY);
      const h = Math.floor(m / 60);
      const mm = m % 60;
      return String(h).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
    }

    function scenarioHasWeather(scenarioId) {
      return (SCENARIO_AGENTS[scenarioId] || []).includes('specialist_weather');
    }

    function weatherSimAxisLabel(simMinutes) {
      const day = Math.floor(simMinutes / MIN_PER_DAY) + 1;
      return 'd' + day + '·' + fmtTime(simMinutes);
    }

    function weatherForecastDatasetTemplate() {
      return [
        { label: 'Temperature °C', data: [], borderColor: '#79c0ff', tension: 0.15, pointRadius: 0, pointHitRadius: 6, borderWidth: 1.5, spanGaps: true },
        { label: 'Feels like °C', data: [], borderColor: '#d2a8ff', tension: 0.15, pointRadius: 0, pointHitRadius: 6, borderWidth: 1.5, spanGaps: true },
        { label: 'Wind km/h', data: [], borderColor: '#8b949e', yAxisID: 'y1', tension: 0.15, pointRadius: 0, pointHitRadius: 6, borderWidth: 1, spanGaps: true },
      ];
    }

    function prepareWeatherChartForSimRun() {
      state.weatherChartMode = 'sim';
      state.lastWeatherSimTs = null;
      state.weatherSimNotes = [];
      state.weatherForecastSimCache = null;
      state.maxSimMinutesForWeatherChart = 0;
      state.simEpochUtcMs = null;
      state.weatherSimFcIdxPerPoint = [];
      weatherSeriesRaw = null;
      const title = document.getElementById('weatherChartTitle');
      if (title) title.textContent = 'Weather chart · preparing…';
      const errEl = document.getElementById('weatherChartErr');
      if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }
      if (!chartWeather) return;
      chartWeather.data.labels = [];
      chartWeather.data.datasets = [{
        label: 'Forecast °C',
        data: [],
        borderColor: '#79c0ff',
        backgroundColor: 'rgba(121, 192, 255, 0.12)',
        fill: true,
        tension: 0.2,
        pointRadius: 2,
        pointHitRadius: 8,
        borderWidth: 2,
        spanGaps: true,
      }];
      if (chartWeather.options.scales.y1) chartWeather.options.scales.y1.display = false;
      chartWeather.update('none');
      requestAnimationFrame(() => { chartWeather.resize(); });
    }

    function forecastIndexForUtcMs(timeMs, virtualMs) {
      if (!timeMs || !timeMs.length) return 0;
      let lo = 0, hi = timeMs.length - 1;
      while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (timeMs[mid] <= virtualMs) lo = mid + 1;
        else hi = mid - 1;
      }
      return Math.max(0, Math.min(hi, timeMs.length - 1));
    }

    async function fetchWeatherSeriesForSimRun() {
      const errEl = document.getElementById('weatherChartErr');
      try {
        const res = await fetch(haloApiUrl('/api/weather_series'), { cache: 'no-store' });
        if (!res.ok) {
          const t = await res.text().catch(() => '');
          console.warn('Sim forecast /api/weather_series', res.status, t);
          if (errEl) {
            errEl.style.display = 'block';
            let hint = '';
            if (res.status === 404) {
              hint = ' (404: this page’s host is not FastAPI — open http://127.0.0.1:8004/ in a normal browser, or set meta halo-api-origin to your API URL. Embedded / Live Server previews often cause this.)';
            }
            errEl.textContent = 'Forecast API HTTP ' + res.status + hint + ' Chart falls back to broadcast points.';
          }
          return false;
        }
        const d = await res.json();
        if (!(d.time || []).length) {
          if (errEl) {
            errEl.style.display = 'block';
            errEl.textContent = 'Open-Meteo returned no hourly rows.';
          }
          return false;
        }
        if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }
        state.weatherForecastSimCache = d;
        state.maxSimMinutesForWeatherChart = 0;
        return true;
      } catch (e) {
        console.warn('Sim forecast series fetch failed', e);
        if (errEl) {
          errEl.style.display = 'block';
          errEl.textContent = 'Could not load forecast: ' + (e && e.message ? e.message : e);
        }
        state.weatherForecastSimCache = null;
        return false;
      }
    }

    function updateSimForecastWeatherChart() {
      if (!chartWeather || state.weatherChartMode !== 'sim' || !state.weatherForecastSimCache) return;
      const series = state.weatherForecastSimCache;
      const temps = series.temperature_2m || [];
      const timeMs = series.time_ms;
      const n = temps.length;
      if (!n) return;
      const maxM = state.maxSimMinutesForWeatherChart;
      const endHour = Math.floor(maxM / 60);
      const minSpan = Math.min(6, n);
      const H = Math.max(endHour, minSpan - 1);
      const labels = [];
      const row = [];
      const fcIdxs = [];
      const aligned =
        state.simEpochUtcMs != null &&
        Array.isArray(timeMs) &&
        timeMs.length === n;
      if (aligned) {
        for (let h = 0; h <= H; h++) {
          const virtualMs = state.simEpochUtcMs + h * 3600000;
          const idx = forecastIndexForUtcMs(timeMs, virtualMs);
          labels.push(weatherSimAxisLabel(h * 60));
          row.push(_numOrNaN(temps[idx]));
          fcIdxs.push(idx);
        }
      } else {
        const uptoHour = Math.min(n - 1, Math.max(endHour, minSpan - 1));
        for (let h = 0; h <= uptoHour; h++) {
          labels.push(weatherSimAxisLabel(h * 60));
          row.push(_numOrNaN(temps[h]));
          fcIdxs.push(h);
        }
      }
      state.weatherSimFcIdxPerPoint = fcIdxs;
      chartWeather.data.labels = labels;
      chartWeather.data.datasets[0].data = row;
      chartWeather.data.datasets[0].label = 'Open-Meteo hourly forecast °C (API)';
      chartWeather.data.datasets[0].pointRadius = row.length <= 3 ? 4 : 2;
      chartWeather.update();
      requestAnimationFrame(() => { chartWeather.resize(); });
    }

    function bumpSimForecastTimelineFromEvent(data) {
      if (!data || typeof data.timestamp !== 'number') return;
      if (state.weatherChartMode !== 'sim') return;
      state.maxSimMinutesForWeatherChart = Math.max(state.maxSimMinutesForWeatherChart, data.timestamp);
      if (state.weatherForecastSimCache) updateSimForecastWeatherChart();
    }

    function appendSimWeatherPoint(simMinutes, tempC, detail) {
      if (state.weatherForecastSimCache) return;
      if (state.weatherChartMode !== 'sim' || !chartWeather || tempC == null || simMinutes == null) return;
      if (state.lastWeatherSimTs === simMinutes) return;
      state.lastWeatherSimTs = simMinutes;
      chartWeather.data.datasets[0].label = 'Outdoor °C (synthetic · broadcasts)';
      chartWeather.data.labels.push(weatherSimAxisLabel(simMinutes));
      chartWeather.data.datasets[0].data.push(Number(tempC));
      let note = '';
      if (detail) {
        if (detail.condition) note = detail.condition;
        else if (detail.state_value != null) note = String(detail.state_value) + '°C';
      }
      state.weatherSimNotes.push(note);
      chartWeather.update('none');
    }

    function buildLeftColumn() {
      const el = document.getElementById('colLeft');
      el.innerHTML = '';
      const allowed = new Set(SCENARIO_AGENTS[state.currentScenario] || []);
      for (const a of AGENTS) {
        if (a.role === 'dishwasher' && !allowed.has('device_dishwasher')) continue;
        if (a.role === 'weather' && !allowed.has('specialist_weather')) continue;
        const card = document.createElement('div');
        card.className = 'agent-card';
        card.dataset.agentId = a.id;
        const weatherPill = a.id === 'specialist_weather'
          ? '<span class="weather-source-pill synth" data-weather-pill style="display:none">SYNTHETIC</span>'
          : '';
        card.innerHTML = `
          <div class="pulse-dot" data-pulse></div>
          <h3>${a.name} <span class="badge ${a.type}">${a.type}</span>${weatherPill}</h3>
          <div class="status-badge st-idle" data-status>idle</div>
          <div class="card-detail" data-detail>—</div>`;
        el.appendChild(card);
      }
      // device_failure adds shower — not in AGENTS list; inject card
      if (allowed.has('device_shower')) {
        const card = document.createElement('div');
        card.className = 'agent-card';
        card.dataset.agentId = 'device_shower';
        card.innerHTML = `
          <div class="pulse-dot" data-pulse></div>
          <h3>Shower <span class="badge device">device</span></h3>
          <div class="status-badge st-idle" data-status>idle</div>
          <div class="card-detail" data-detail>—</div>`;
        el.appendChild(card);
      }
    }

    function setAgentCard(id, statusClass, statusText, detail) {
      const card = document.querySelector(`[data-agent-id="${id}"]`);
      if (!card) return;
      const st = card.querySelector('[data-status]');
      st.className = 'status-badge ' + statusClass;
      st.textContent = statusText;
      card.querySelector('[data-detail]').textContent = detail;
    }

    function apiStatusDotColor(status) {
      if (status === 'live') return '#22c55e';
      if (status === 'cached') return '#d29922';
      if (status === 'synthetic') return '#9ca3af';
      if (status === 'error') return '#f85149';
      return '#6b7280';
    }

    function thermostatDetailLine() {
      const sp = state.thermo.setpoint;
      const base = (typeof sp === 'number' ? sp : 20).toFixed(1) + '°C setpoint';
      return state.thermo.outdoorHeatingOff ? base + ' · heating off (warm outside)' : base;
    }

    function updateWeatherSourcePill(source) {
      const pill = document.querySelector('[data-agent-id="specialist_weather"] [data-weather-pill]');
      if (!pill) return;
      const liveLike = source === 'live' || source === 'cached';
      pill.style.display = 'inline-block';

    const feedEl = document.getElementById('feed');
    function pushFeed(msg, desc, type) {
      const row = document.createElement('div');
      row.className = 'feed-row';
      const colors = {
        PreferenceDeclaration: '#3fb950',
        NegotiationProposal: '#58a6ff',
        NegotiationResolved: '#a371f7',
        CarbonIntensityUpdate: '#79c0ff',
        DeviceFailureNotice: '#f85149',
        default: '#8b949e',
      };
      const c = colors[type] || colors.default;
      row.style.borderLeftColor = c;
      row.innerHTML = `<span class="time">${fmtTime(msg.timestamp)}</span> · <strong>${msg.sender}</strong> → ${msg.recipient} · <span class="pill" style="background:${c}33">${type}</span> ${desc || ''}`;
      feedEl.insertBefore(row, feedEl.firstChild);
      while (feedEl.children.length > 200) feedEl.removeChild(feedEl.lastChild);
    }

    const eventQueue = [];
    let evtSource = null;
    /** True while an SSE sim run is active — blocks idle loadWeatherSeriesChart from clobbering the sim forecast chart. */
    let simStreamActive = false;

    function enqueue(kind, data) {
      eventQueue.push({ kind, data });
    }

    let chartLine, chartBar, chartWeather;
    let weatherSeriesRaw = null;
    const lineData = { labels: [], setpoint: [], alice: [], bob: [] };
    const barData = { labels: [], iters: [], colors: [] };

                      ? state.weatherSimFcIdxPerPoint[i]
                      : i;
                    const w = fc.weather_code && fc.weather_code[j];
                    const c = fc.condition && fc.condition[j];
                    if (w != null && c) return [`WMO ${w} · ${c}`];
                    return [];
                  }
                  if (state.weatherChartMode === 'sim') {
                    const n = state.weatherSimNotes[i];
                    return n ? [n] : [];

                  if (!weatherSeriesRaw) return [];
                  const code = weatherSeriesRaw.weather_code[i];

    async function loadWeatherSeriesChart() {
      if (simStreamActive && state.weatherChartMode === 'sim') return;
      const errEl = document.getElementById('weatherChartErr');
      if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }
      if (!chartWeather) return;
      const title = document.getElementById('weatherChartTitle');
      if (title) title.textContent = 'Open-Meteo hourly · London (full forecast window)';
      state.weatherChartMode = 'forecast';
      state.lastWeatherSimTs = null;
      state.weatherSimNotes = [];
      state.weatherForecastSimCache = null;
      state.maxSimMinutesForWeatherChart = 0;
      try {
        const res = await fetch(haloApiUrl('/api/weather_series'), { cache: 'no-store' });
        if (simStreamActive && state.weatherChartMode === 'sim') return;
        if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
        const d = await res.json();
        if (simStreamActive && state.weatherChartMode === 'sim') return;
        const times = d.time || [];
        if (!times.length) throw new Error('No hourly rows in response');
        weatherSeriesRaw = d;
        const labels = times.map(t => String(t).replace('T', ' ').slice(5, 16));
        chartWeather.data.labels = labels;
        chartWeather.data.datasets = weatherForecastDatasetTemplate();
        chartWeather.data.datasets[0].data = (d.temperature_2m || []).map(_numOrNaN);
        chartWeather.data.datasets[1].data = (d.apparent_temperature || []).map(_numOrNaN);
        chartWeather.data.datasets[2].data = (d.wind_speed_10m || []).map(_numOrNaN);
        if (chartWeather.options.scales.y1) chartWeather.options.scales.y1.display = true;
        chartWeather.update();
        requestAnimationFrame(() => { chartWeather.resize(); });
      } catch (e) {
        console.warn('Weather series chart failed', e);
        if (errEl) {
          errEl.style.display = 'block';
          errEl.textContent = 'Could not load weather series: ' + (e && e.message ? e.message : e);
        }
      }
    }

    function processOneEvent(kind, data) {
      bumpSimForecastTimelineFromEvent(data);
      if (kind === 'message') {
        document.getElementById('simTime').textContent = 'Sim: ' + fmtTime(data.timestamp);
        state.bob._minuteOfDay = data.timestamp % MIN_PER_DAY;
        pushFeed(data, data.description, data.msg_type);
        pulseAgent(data.sender);
        if (data.recipient !== 'broadcast') pulseAgent(data.recipient);
      }
      if (kind === 'negotiation') {
        state.metrics.neg++;
        document.getElementById('mNeg').textContent = String(state.metrics.neg);
        if (data.converged) {
          state.metrics.convSum++;
          state.metrics.convN++;
        }
        const cr = state.metrics.convN ? (state.metrics.convSum / state.metrics.convN * 100) : 0;
        document.getElementById('mConv').textContent = cr.toFixed(1) + '%';
        const sats = Object.values(data.satisfaction_scores || {});
        if (sats.length) {
          const m = sats.reduce((a,b)=>a+b,0)/sats.length;
          state.metrics.satSum += m;
          state.metrics.satN++;
          document.getElementById('mSat').textContent = (state.metrics.satSum / state.metrics.satN).toFixed(3);
        }
        state.thermo.setpoint = data.final_value;
        state.negotiationLine = { x1: 180, y1: 140, x2: 120, y2: 150 };
        setTimeout(() => { state.negotiationLine = null; updateFloor(); }, 800);
        const prefs = data.participant_preferences || {};
        const tlab = fmtTime(data.timestamp);
        chartLine.data.labels.push(tlab);
        chartLine.data.datasets[0].data.push(data.final_value);
        chartLine.data.datasets[1].data.push(prefs.person_alice != null ? prefs.person_alice : null);
        chartLine.data.datasets[2].data.push(prefs.person_bob != null ? prefs.person_bob : null);
        chartLine.update('none');
        const it = data.iterations;
        let col = '#3fb950';
        if (it > 7) col = '#f85149';
        else if (it > 3) col = '#d29922';
        chartBar.data.labels.push('#' + state.metrics.neg);
        chartBar.data.datasets[0].data.push(it);
        chartBar.data.datasets[0].backgroundColor.push(col);
        chartBar.update('none');
        updateFloor();
        setAgentCard('device_thermostat', 'st-resolved', 'resolved', data.final_value.toFixed(1) + '°C comfort resolved');
      }
      if (kind === 'failure') {
        setAgentCard(data.device_id, 'st-failed', 'failed', 'recovery: ' + (data.recovery_succeeded ? 'ok' : 'pending'));
      }
      if (kind === 'learning') {
        const pid = data.person_id;
        const txt = `EMA ${data.ema_value.toFixed(2)} | μ=${data.bayesian_mu.toFixed(2)} σ=${data.bayesian_sigma.toFixed(2)}`;
        setAgentCard(pid, 'st-home', data.routine_stable ? 'stable routine' : 'learning', txt);
      }
      if (kind === 'agent_state') {
        const id = data.agent_id;
        const v = data.state_value;
        if (data.state_key === 'presence') {
          if (id === 'person_alice') {
            state.alice.home = v === 'home';
            setAgentCard(id, v === 'home' ? 'st-home' : 'st-away', v, state.alice.pref + '°C preferred');
          }
          if (id === 'person_bob') {
            state.bob.home = v === 'home';
            setAgentCard(id, v === 'home' ? 'st-home' : 'st-away', v, state.bob.pref + '°C preferred');
          }
        }
        if (data.state_key === 'preferred_temperature' && typeof v === 'number') {
          if (id === 'person_alice') { state.alice.pref = v; setAgentCard(id, 'st-home', 'home', v + '°C preferred | ' + (state.alice.home ? 'home' : 'away')); }
          if (id === 'person_bob') { state.bob.pref = v; setAgentCard(id, 'st-home', 'home', v + '°C preferred | ' + (state.bob.home ? 'home' : 'away')); }
        }
        if (data.state_key === 'device_state') {
          if (id === 'device_thermostat') {
            state.thermo.device_state = v;
            const map = { negotiating: ['st-negotiating','negotiating'], resolved: ['st-resolved','resolved'], idle: ['st-idle','idle'], failed: ['st-failed','failed'] };
            const m = map[v] || ['st-idle', v];
            setAgentCard(id, m[0], m[1], thermostatDetailLine());
          }
          if (id === 'device_dishwasher') {
            state.dishwasher.state = v === 'running' ? 'running' : v === 'scheduled' ? 'scheduled' : 'idle';
            setAgentCard(id, 'st-idle', state.dishwasher.state, '—');
          }
        }
        if (data.state_key === 'target_temp' && typeof v === 'number' && id === 'device_thermostat') {
          state.thermo.setpoint = v;
          setAgentCard('device_thermostat', 'st-idle', 'idle', thermostatDetailLine());
        }
        if (data.state_key === 'outdoor_heating_off' && id === 'device_thermostat') {
          state.thermo.outdoorHeatingOff = !!data.state_value;
          setAgentCard('device_thermostat', 'st-idle', 'idle', thermostatDetailLine());
        }
        if (data.state_key === 'outdoor_temp' && id === 'specialist_weather' && typeof v === 'number') {
          state.weather.temp = v;
          setAgentCard('specialist_weather', 'st-home', 'live', v.toFixed(1) + '°C outdoor');
          if (data.data_source) updateWeatherSourcePill(data.data_source);
        }
        updateFloor();
      }
      if (kind === 'carbon') {
        state.carbon.value = data.value;
        state.carbon.level = data.level;
        document.getElementById('mCarb').textContent = Math.round(data.value) + ' · ' + data.level;
        setAgentCard('specialist_carbon', 'st-home', data.level, Math.round(data.value) + ' gCO2/kWh — ' + data.level);
        if (data.source === 'live' || data.source === 'cached') {
          document.getElementById('carbon-dot').style.background = apiStatusDotColor(data.source);
        } else if (data.source === 'synthetic') {
          document.getElementById('carbon-dot').style.background = apiStatusDotColor('synthetic');
        }
      }
      if (kind === 'weather') {
        if (data.source) updateWeatherSourcePill(data.source);
        if (data.temperature != null) {
          document.getElementById('api-temp').textContent =
            `${data.temperature}°C · ${data.condition || '—'}`;
        }
        if (state.weatherChartMode === 'sim' && data.timestamp != null && data.temperature != null && !state.weatherForecastSimCache) {
          appendSimWeatherPoint(data.timestamp, data.temperature, data);
        }
      }
      if (kind === 'api_status') {
        document.getElementById('carbon-dot').style.background = apiStatusDotColor(data.carbon);
        document.getElementById('weather-dot').style.background = apiStatusDotColor(data.weather);
        document.getElementById('api-temp').textContent =
          `${data.current_temp}°C · ${data.current_condition}`;
        document.getElementById('api-carbon').textContent =
          `${data.current_carbon} gCO2`;
      }
    }

    setInterval(() => {
      if (eventQueue.length === 0) return;
      const ev = eventQueue.shift();
      processOneEvent(ev.kind, ev.data);
    }, 100);

    function resetMetrics() {
      state.metrics = { neg: 0, convSum: 0, convN: 0, satSum: 0, satN: 0 };
      document.getElementById('mNeg').textContent = '0';
      document.getElementById('mConv').textContent = '—';
      document.getElementById('mSat').textContent = '—';
      document.getElementById('mCarb').textContent = '—';
      feedEl.innerHTML = '';
      chartLine.data.labels = [];
      chartLine.data.datasets.forEach(d => d.data = []);
      chartLine.update('none');
      chartBar.data.labels = [];
      chartBar.data.datasets[0].data = [];
      chartBar.data.datasets[0].backgroundColor = [];
      chartBar.update('none');
    }

    function startStream() {
      if (evtSource) { evtSource.close(); evtSource = null; }
      simStreamActive = true;
      const rs = document.getElementById('runStatus');
      rs.textContent = '';
      rs.className = '';
      rs.title = '';
      resetMetrics();
      const scenario = document.getElementById('scenario').value;
      const days = document.getElementById('days').value;
      const seed = document.getElementById('seed').value;
      const liveOn = document.getElementById('liveDataToggle').checked;
      state.currentScenario = scenario;
      buildLeftColumn();
      updateFloor();

      if (scenarioHasWeather(scenario)) {
        prepareWeatherChartForSimRun();
        const titleEl = document.getElementById('weatherChartTitle');
        if (titleEl) {
          titleEl.textContent = liveOn
            ? 'Open-Meteo hourly prediction · loading… (agents: Live Data)'
            : 'Open-Meteo hourly prediction · loading… (agents: synthetic)';
        }
        void fetchWeatherSeriesForSimRun().then((got) => {
          if (state.currentScenario !== scenario || state.weatherChartMode !== 'sim') return;
          const el = document.getElementById('weatherChartTitle');
          if (got && el) {
            el.textContent = liveOn
              ? 'Open-Meteo hourly prediction · grows with simulated time (agents: Live Data)'
              : 'Open-Meteo hourly prediction · grows with simulated time (agents: synthetic)';
            updateSimForecastWeatherChart();
          } else if (el) {
            el.textContent = 'Outdoor °C (synthetic) · broadcast samples (forecast fetch failed)';
          }
        });
      } else {
        void loadWeatherSeriesChart();
      }

      let url = haloApiUrl(`/stream?scenario=${encodeURIComponent(scenario)}&days=${encodeURIComponent(days)}&seed=${encodeURIComponent(seed)}`);
      if (liveOn) {
        url += '&live_data=true';
      }
      evtSource = new EventSource(url);

      evtSource.addEventListener('run_start', e => {
        const d = JSON.parse(e.data);
        const ms = Date.parse(d.sim_epoch_utc);
        if (Number.isFinite(ms)) state.simEpochUtcMs = ms;
        if (state.weatherForecastSimCache && state.weatherChartMode === 'sim') updateSimForecastWeatherChart();
      });
      evtSource.addEventListener('message', e => enqueue('message', JSON.parse(e.data)));
      evtSource.addEventListener('negotiation', e => enqueue('negotiation', JSON.parse(e.data)));
      evtSource.addEventListener('failure', e => enqueue('failure', JSON.parse(e.data)));
      evtSource.addEventListener('learning', e => enqueue('learning', JSON.parse(e.data)));
      evtSource.addEventListener('agent_state', e => enqueue('agent_state', JSON.parse(e.data)));
      evtSource.addEventListener('carbon', e => enqueue('carbon', JSON.parse(e.data)));
      evtSource.addEventListener('weather', e => enqueue('weather', JSON.parse(e.data)));
      evtSource.addEventListener('api_status', e => enqueue('api_status', JSON.parse(e.data)));
      evtSource.addEventListener('done', e => {
        const summary = JSON.parse(e.data);
        console.info('Run complete', summary);
        const rs = document.getElementById('runStatus');
        const n = summary.total_negotiations ?? '—';
        rs.textContent = `Complete · ${n} negotiations · outputs saved`;
        rs.className = 'done';
        rs.title = JSON.stringify(summary, null, 2);
        evtSource.close();
        evtSource = null;
        simStreamActive = false;
        if (scenarioHasWeather(state.currentScenario)) {
          if (state.weatherForecastSimCache) updateSimForecastWeatherChart();
        } else {
          void loadWeatherSeriesChart();
        }
      });
      evtSource.addEventListener('error', e => {
        if (e instanceof MessageEvent && e.data) {
          try {
            const d = JSON.parse(e.data);
            alert('Simulation error:\n' + (d.traceback || ''));
          } catch (_) {}
          evtSource.close();
          evtSource = null;
          simStreamActive = false;
        }
      });
    }

    document.getElementById('run').addEventListener('click', () => { void startStream(); });
    document.getElementById('stop').addEventListener('click', () => {
      if (evtSource) {
        evtSource.close();
        evtSource = null;
      }
      simStreamActive = false;
      while (eventQueue.length) eventQueue.shift();
      const rs = document.getElementById('runStatus');
      rs.textContent = 'Stopped';
      rs.className = 'done';
      rs.title = '';
      if (scenarioHasWeather(state.currentScenario)) {
        if (state.weatherForecastSimCache) updateSimForecastWeatherChart();
      } else {
        void loadWeatherSeriesChart();
      }
    });
    document.getElementById('scenario').addEventListener('change', e => {
      state.currentScenario = e.target.value;
      buildLeftColumn();
      updateFloor();
    });

    initCharts();
    buildLeftColumn();
    updateFloor();
    checkApiStatus();
    document.getElementById('weatherChartRefresh').addEventListener('click', loadWeatherSeriesChart);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => loadWeatherSeriesChart());
    });
  </script>
</body>
</html>
