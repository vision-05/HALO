<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HALO · LLM inspector</title>
  <style>
    :root {
      --bg: #0d1117;
      --fg: #e6edf3;
      --muted: #8b949e;
      --border: #30363d;
      --accent: #58a6ff;
      --green: #3fb950;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.45;
      padding: 1rem 1.25rem 2rem;
      max-width: 960px;
      margin-left: auto;
      margin-right: auto;
    }
    h1 { font-size: 1.25rem; font-weight: 650; margin: 0 0 0.35rem; }
    .sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.25rem; }
    a { color: var(--accent); }
    .row { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; margin-bottom: 1rem; }
    button {
      background: #21262d;
      color: var(--fg);
      border: 1px solid var(--border);
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button:hover { border-color: var(--accent); }
    #status { font-size: 0.8rem; color: var(--muted); }
    h2 { font-size: 0.95rem; margin: 1.25rem 0 0.5rem; color: #c9d1d9; }
    .card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.75rem;
      background: #161b22;
    }
    .card h3 { margin: 0 0 0.5rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }
    .effects dt { font-weight: 600; color: #79c0ff; margin-top: 0.5rem; font-size: 0.8rem; }
    .effects dd { margin: 0.15rem 0 0 0; color: var(--muted); font-size: 0.8rem; }
    .tl-kind { font-size: 0.72rem; text-transform: uppercase; color: #a371f7; font-weight: 700; letter-spacing: 0.05em; }
    .tl-time { color: var(--muted); font-size: 0.78rem; }
    pre.ctx {
      margin: 0.5rem 0 0;
      padding: 0.5rem 0.65rem;
      background: #0d1117;
      border-radius: 6px;
      font-size: 0.72rem;
      overflow-x: auto;
      border: 1px solid var(--border);
      max-height: 220px;
      overflow-y: auto;
    }
    details { margin-top: 0.35rem; }
    summary { cursor: pointer; color: var(--accent); font-size: 0.8rem; }
    .outcome {
      margin-top: 8px;
      padding: 8px 10px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      font-size: 0.78rem;
      line-height: 1.4;
      color: #c9d1d9;
    }
    .outcome strong {
      color: #79c0ff;
    }
  </style>
</head>
<body>
  <h1>LLM inspector</h1>
  <p class="sub">
    Polls <code>/api/llm-inspector</code> (same origin as this page). Start <strong>Run</strong> on the
    <a href="/">main dashboard</a> in another tab first — the timeline is filled by the SimPy worker
    while <code>/stream</code> is open. Cleared when a new stream starts.
  </p>
  <div class="row">
    <label><input type="checkbox" id="auto" checked /> Auto-refresh (1.5s)</label>
    <button type="button" id="refresh">Refresh now</button>
    <span id="status"></span>
  </div>
  <div id="err" class="err" style="display:none;"></div>
  <h2>How outputs change the simulation</h2>
  <div id="effects" class="card"><h3>Loading…</h3></div>
  <h2>Timeline (newest first)</h2>
  <div id="timeline"></div>

  <script>
    const effectsEl = document.getElementById('effects');
    const timelineEl = document.getElementById('timeline');
    const statusEl = document.getElementById('status');
    const errEl = document.getElementById('err');
    const autoChk = document.getElementById('auto');
    let timer = null;

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function renderEffects(ref) {
      if (!ref || typeof ref !== 'object') {
        effectsEl.innerHTML = '<h3>Effects reference</h3><p class="err">No effects_reference in response.</p>';
        return;
      }
      const parts = Object.entries(ref).map(
        ([k, v]) => `<dt>${esc(k)}</dt><dd>${esc(v)}</dd>`,
      );
      effectsEl.innerHTML = '<h3>Effects reference</h3><dl class="effects">' + parts.join('') + '</dl>';
    }

    function renderTimeline(items) {
      if (!items.length) {
        timelineEl.innerHTML =
          '<div class="card"><p style="margin:0;color:var(--muted);font-size:0.85rem;">No LLM events yet. Is a stream running?</p></div>';
        return;
      }
      const rev = items.slice().reverse();
      timelineEl.innerHTML = rev
        .map((ev) => {
          const k = ev.kind || '?';
          let body = '';
          if (k === 'llm_reasoning') {
            const hints = Array.isArray(ev.pending_effect_hints)
              ? ev.pending_effect_hints
                  .map(
                    (h) =>
                      `<li><code>${esc(h.api_id)}</code> → <code>${esc(h.halo_message_type || '')}</code>: ${esc(h.effect_summary || '')}</li>`,
                  )
                  .join('')
              : '';
            const ctx = Array.isArray(ev.context_snapshot)
              ? ev.context_snapshot
                  .map(
                    (c) =>
                      `[${esc(c.sim_time_str || '')}] ${esc(c.msg_type || '')} (${esc(c.sender || '')}) — ${esc(c.summary || '')}`,
                  )
                  .join('\n')
              : '';
            body =
              `<div class="tl-time">${esc(ev.sim_time_str || '')}</div>` +
              `<div style="margin:0.35rem 0;"><strong>${ev.relevant ? 'Relevant' : 'Not relevant'}</strong> · api_id: <code>${esc(String(ev.api_id || ''))}</code></div>` +
              `<div style="font-size:0.85rem;">${esc(String(ev.reason || ''))}</div>` +
              (hints ? `<ul style="margin:0.4rem 0 0 1rem;font-size:0.78rem;color:var(--muted);">${hints}</ul>` : '') +
              (ctx
                ? `<details><summary>Context window (${ev.context_size || 0} lines)</summary><pre class="ctx">${esc(ctx)}</pre></details>`
                : '');
          } else if (k === 'llm_api_call') {
            body =
              `<div class="tl-time">${esc(ev.sim_time_str || '')}</div>` +
              `<div>API <code>${esc(String(ev.api_id || ''))}</code> · ${ev.success ? '<span style="color:var(--green)">ok</span>' : '<span style="color:#f85149">fail</span>'}</div>` +
              `<div style="font-size:0.8rem;color:var(--muted);">→ <code>${esc(String(ev.halo_message_type || ''))}</code></div>` +
              `<div style="font-size:0.82rem;margin-top:0.35rem;">${esc(String(ev.observation_summary || ''))}</div>`;
          } else if (k === 'llm_observation') {
            body =
              `<div class="tl-time">${esc(ev.sim_time_str || '')}</div>` +
              `<div><code>${esc(String(ev.msg_type || ''))}</code> · ${esc(String(ev.severity || ''))}</div>` +
              `<div style="font-size:0.82rem;margin-top:0.35rem;">${esc(String(ev.summary || ''))}</div>`;
          } else if (k === 'llm_pipeline_error') {
            body =
              `<div class="tl-time">${esc(ev.sim_time_str || '')}</div>` +
              `<div><code>${esc(String(ev.phase || ''))}</code> · <code>${esc(String(ev.api_id || ''))}</code></div>` +
              `<div style="font-size:0.82rem;">${esc(String(ev.message || ''))}</div>`;
          } else {
            body = '<pre class="ctx">' + esc(JSON.stringify(ev, null, 2)) + '</pre>';
          }
          const out = String(ev.sim_effect || '').trim();
          const outHtml = out
            ? `<div class="outcome"><strong>Outcome</strong> — ${esc(out)}</div>`
            : '';
          return `<div class="card"><span class="tl-kind">${esc(k)}</span>${body}${outHtml}</div>`;
        })
        .join('');
    }

    async function load() {
      errEl.style.display = 'none';
      statusEl.textContent = 'Loading…';
      try {
        const r = await fetch('/api/llm-inspector', { cache: 'no-store' });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        renderEffects(data.effects_reference);
        renderTimeline(data.timeline || []);
        statusEl.textContent =
          'timeline_count=' +
          (data.timeline_count ?? (data.timeline || []).length) +
          ' · ' +
          new Date().toLocaleTimeString();
      } catch (e) {
        errEl.style.display = 'block';
        errEl.textContent = String(e.message || e);
        statusEl.textContent = 'Error';
      }
    }

    document.getElementById('refresh').addEventListener('click', () => void load());

    function tickAuto() {
      if (autoChk.checked) void load();
    }

    autoChk.addEventListener('change', () => {
      if (timer) clearInterval(timer);
      timer = null;
      if (autoChk.checked) {
        timer = setInterval(tickAuto, 1500);
        void load();
      }
    });

    timer = setInterval(tickAuto, 1500);
    void load();
  </script>
</body>
</html>
