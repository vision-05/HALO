services:
  language:
    build:
      context: ./agents
      dockerfile: language/Dockerfile
      target: prod
    container_name: halo-language
    network_mode: host
    volumes:
      - ./agents/language/src:/app/language/src
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    environment:
      - CLAUDE_KEY
      - TELEGRAM_KEY
      - TEL_CHAT_ID
      - LANG_MODE
      - PYTHONUNBUFFERED=1
    command: python -m watchfiles 'python /app/language/src/main.py' /app

  simulation:
    build:
      context: .
      dockerfile: halo_simulation/Dockerfile
      target: prod
    volumes:
     - ./halo_simulation:/app
     - ./agents/db:/app/db
    environment:
      - PYTHONPATH=.
    ports:
      - 8000:8000
    command: python -m uvicorn server:app --host 0.0.0.0 --port 8000

  security:
    build:
      context: ./agents
      dockerfile: security/Dockerfile
      target: prod
    network_mode: host
    volumes:
      - ./agents/security/src:/app/security/src
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    environment:
      - PYTHONUNBUFFERED=1
      - AGENT_NAME=SecurityCam
      - AGENT_ROLE=Actuator
    command: python -m watchfiles 'python /app/security/src/suspicion_detection.py' /app

  advocator:
    build:
      context: ./agents
      dockerfile: advocator/Dockerfile
      target: prod
    network_mode: host
    volumes:
      - ./agents/advocator/src:/app/advocator/src
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    environment:
      - PYTHONUNBUFFERED=1
      - AGENT_NAME
      - AGENT_ROLE=Advocator


  language-test:
    build:
      context: ./agents
      dockerfile: language/Dockerfile
      target: test
    container_name: halo-language-test
    environment:
      - CLAUDE_key
    volumes:
      - ./agents/language/src:/app/src
      - ./agents/language/test:/app/test

  generic:
    build:
      context: ./agents
      dockerfile: generic/Dockerfile
      target: prod
    deploy:
      replicas: 5
    network_mode: host
    environment:
      - PYTHONUNBUFFERED=1
      - AGENT_NAME=LivingRoomLight
      - AGENT_ROLE=Actuator

  dishwasher:
    build:
      context: ./agents
      dockerfile: generic/Dockerfile
      target: prod
    network_mode: host
    environment:
      - PYTHONUNBUFFERED=1
      - AGENT_NAME=Dishwasher
      - AGENT_ROLE=Actuator

  security_cam:
    build:
      context: ./agents
      dockerfile: generic/Dockerfile
      target: prod
    network_mode: host
    environment:
      - PYTHONUNBUFFERED=1
      - AGENT_NAME=SecurityCam
      - AGENT_ROLE=Actuator

  livingroomtv:
    build:
      context: ./agents
      dockerfile: generic/Dockerfile
      target: tv
    network_mode: host
    volumes:
      - ./agents/generic/src:/app/generic/src
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    environment:
      - PYTHONUNBUFFERED=1
      - AGENT_NAME=LivingRoomTV
      - AGENT_ROLE=Actuator
    command: python -m watchfiles 'python /app/generic/src/tcltv.py' /app

  stream:
    build:
      context: ./agents
      dockerfile: generic/Dockerfile
      target: stream
    network_mode: host
    volumes:
      - ./agents/generic/src:/app/generic/src
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    environment:
      - PYTHONUNBUFFERED=1
      - AGENT_NAME=StreamingAggregator
      - AGENT_ROLE=Aggregator
    command: python -m watchfiles 'python /app/generic/src/streaming_agg.py' /app

  weather:
    build:
      context: ./agents
      dockerfile: generic/Dockerfile
      target: weather
    network_mode: host
    volumes:
      - ./agents/generic/src:/app/generic/src
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    environment:
      - PYTHONUNBUFFERED=1
      - AGENT_NAME=WEatherAggregator
      - AGENT_ROLE=Aggregator
    command: python -m watchfiles 'python /app/generic/src/weather.py' /app

  rl-agent:
    build:
      context: .
      dockerfile: agents/rl/Dockerfile
      target: prod
    container_name: halo-rl-agent
    network_mode: host
    volumes:
      - ./agents/rl/src:/app/rl/src
      - ./agents/discovery/src:/app/discovery/src
      - ./RL:/app/RL
      - ./routine_learning:/app/routine_learning
      - ./agents/db:/app/db
    environment:
      - PYTHONUNBUFFERED=1
      - AGENT_NAME=RLAgent
      - AGENT_ROLE=Planner
      - RL_PROFILE_PATH=/app/routine_learning/user_routine_profile.json
      - RL_MODEL_PATH=/app/RL/smart_home_ppo_agent
      - RL_ACTIVITY_LOG_PATH=/app/db/rl_activity_log.jsonl
      - RL_PREDICTION_INTERVAL_MINUTES=15
      - RL_MONTHLY_WINDOW_DAYS=30
      - RL_MONTHLY_TIMESTEPS=2000
      - RL_MONTHLY_LR=0.00005
      - RL_BOOTSTRAP_TIMESTEPS=25000
      - RL_SEED=42
    command: python /app/rl/src/main.py
  
  generic-test:
    build:
      context: ./agents
      dockerfile: generic/Dockerfile
      target: test
    container_name: halo-generic-test
    volumes:
      - ./agents/generic/src:/app/src
      - ./agents/generic/test:/app/test
      - ./agents/db:/app/db

  bootstrap:
    build:
      context: ./agents
      dockerfile: bootstrap/Dockerfile
      target: prod
    container_name: halo-bootstrap
    network_mode: host
  
  bootstrap-test:
    build:
      context: ./agents
      dockerfile: bootstrap/Dockerfile
      target: test
    container_name: halo-bootstrap-test
    volumes:
      - ./agents/bootstrap/src:/app/bootstrap/src
      - ./agents/bootstrap/test:/app/bootstrap/test
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db

  discovery-test:
    build:
      context: ./agents
      dockerfile: discovery/Dockerfile
      target: test
    container_name: halo-discovery-test
    volumes:
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/discovery/test:/app/discovery/test
      - ./agents/db:/app/db

  discovery-verify:
    build:
      context: ./agents
      dockerfile: discovery/Dockerfile
      target: verify
    container_name: halo-discovery
    volumes:
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    stdin_open: true
    tty: true

  halo-watchdog:
    build: 
      context: .
      dockerfile: agents/watchdog/Dockerfile
      target: prod
    container_name: halo-watchdog
    network_mode: "host"
    restart: unless-stopped
    volumes:
      # THE WORMHOLE: Gives the container God-mode over the host's Docker daemon
      - /var/run/docker.sock:/var/run/docker.sock 
      
      # Optional: Hot-reload mounts for development
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/watchdog/src:/app/watchdog/src
      - ./agents/db:/app/db

  prompt-tune-gen:
    build:
      context: ./prompt-finetuning
      target: gen
    container_name: halo-prompt-gen
    network_mode: "host"
    volumes:
      - ./prompt-finetuning/src/:/app/src/
      - ./prompt-finetuning/data/:/app/data/

  prompt-tune:
    build:
      context: ./prompt-finetuning/
      target: tune
    container_name: halo-prompt-tune
    network_mode: "host"
    volumes:
      - ./prompt-finetuning/src/:/app/src/
      - ./prompt-finetuning/data/:/app/data/

  docs:
    build:
      context: .
      dockerfile: docs/Dockerfile
    container_name: halo-docs
    ports:
      - "8000:8000"
    command: serve -a 0.0.0.0:8000
    volumes:
      - ./:/docs

  washing-machine:
    build:
      context: ./agents
      dockerfile: generic/Dockerfile
      target: washing
    network_mode: "host"
    environment:
      - MIELE_CLIENT_ID
      - MIELE_CLIENT_SECRET
    volumes:
      - ./agents/discovery/src/:/app/discovery/src/
      - ./agents/db/:/app/db/
      - ./agents/generic/:/app/generic/

  ollama:
    image: ollama/ollama:latest
    container_name: halo-ollama
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
  
  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dozzle_data:/data
    ports:
      - 8080:8080


  smartlight:
    build:
      context: ./agents
      dockerfile: generic/Dockerfile
      target: smartlight
    network_mode: host
    volumes:
      - ./agents/generic/src:/app/generic/src
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    environment:
      - HALO_HTTP_KEY=${HALO_HTTP_KEY}
      - LIGHT_ESP32_HOST=smartlight.local
      - PYTHONUNBUFFERED=1

  mocktv:
    build:
      context: ./agents
      dockerfile: generic/Dockerfile
      target: mocktv
    network_mode: host
    volumes:
      - ./agents/generic/src:/app/generic/src
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    environment:
      - HALO_HTTP_KEY
      - TV_ESP32_HOST=192.168.7.87
      - PYTHONUNBUFFERED=1
    command: python -m watchfiles 'python /app/generic/src/mock_tv_agent.py' /app
  
  mock-washing:
    build:
      context: ./agents
      dockerfile: generic/Dockerfile
      target: washingmachine
    network_mode: host
    volumes:
      - ./agents/generic/src:/app/generic/src
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    environment:
      - HALO_HTTP_KEY
      - WASH_ESP32_HOST=192.168.7.89    
      - PYTHONUNBUFFERED=1
    command: python -m watchfiles 'python /app/generic/src/washing_machine.py' /app

  blinds:
    build:
      context: ./agents
      dockerfile: generic/Dockerfile
      target: blinds
    network_mode: host
    volumes:
      - ./agents/generic/src:/app/generic/src
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    environment:
      - HALO_HTTP_KEY
      - BLINDS_ESP32_HOST=192.168.7.90
      - PYTHONUNBUFFERED=1
    command: python -m watchfiles 'python /app/generic/src/blinds.py' /app

  living-room-light:
    build: { context: ./agents, dockerfile: generic/Dockerfile, target: smartlight }
    network_mode: host
    volumes:
      - ./agents/generic/src:/app/generic/src
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    environment:
      - HALO_HTTP_KEY
      - LIGHT_NAME=LivingRoomLight
      - LIGHT_ESP32_HOST=192.168.7.87
      - PYTHONUNBUFFERED=1
    command: python -m watchfiles 'python /app/generic/src/light_agent.py' /app

  bedroom-light:
    build: { context: ./agents, dockerfile: generic/Dockerfile, target: smartlight }
    network_mode: host
    volumes:
      - ./agents/generic/src:/app/generic/src
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    environment:
      - HALO_HTTP_KEY
      - LIGHT_NAME=BedroomLight
      - LIGHT_ESP32_HOST=192.168.7.90
      - PYTHONUNBUFFERED=1
    command: python -m watchfiles 'python /app/generic/src/light_agent.py' /app

  kitchen-light:
    build: { context: ./agents, dockerfile: generic/Dockerfile, target: smartlight }
    network_mode: host
    volumes:
      - ./agents/generic/src:/app/generic/src
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    environment:
      - HALO_HTTP_KEY
      - LIGHT_NAME=KitchenLight
      - LIGHT_ESP32_HOST=10.127.89.27
      - PYTHONUNBUFFERED=1
    command: python -m watchfiles 'python /app/generic/src/light_agent.py' /app
  livingroom:
    build:
      context: ./agents
      dockerfile: generic/Dockerfile
      target: livingroomcombo
    network_mode: host
    volumes:
      - ./agents/generic/src:/app/generic/src
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    environment:
      - HALO_HTTP_KEY
      - COMBO_ESP32_HOST=10.127.89.27
      - PYTHONUNBUFFERED=1
    command: python -m watchfiles 'python /app/generic/src/living_room.py' /app
volumes:
  dozzle_data: