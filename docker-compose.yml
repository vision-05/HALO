services:
  language:
    build:
      context: ./agents
      dockerfile: language/Dockerfile
      target: prod
    container_name: halo-language
    network_mode: host
    volumes:
      - ./agents/language/src:/app/language/src
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    environment:
      - CLAUDE_KEY
      - TELEGRAM_KEY
      - TEL_CHAT_ID
      - PYTHONUNBUFFERED=1
    command: python -m watchfiles 'python /app/language/src/main.py' /app

  simulation:
    build:
      context: .
      dockerfile: halo_simulation/Dockerfile
      target: prod
    volumes:
     - ./halo_simulation:/app
     - ./agents/db:/app/db
    environment:
      - PYTHONPATH=.
    ports:
      - 8000:8000
    command: python -m uvicorn server:app --host 0.0.0.0 --port 8000

  security:
    build:
      context: ./agents
      dockerfile: security/Dockerfile
      target: prod
    network_mode: host
    volumes:
      - ./agents/security/src:/app/security/src
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    environment:
      - PYTHONUNBUFFERED=1
      - AGENT_NAME=SecurityCam
      - AGENT_ROLE=Actuator
    command: python -m watchfiles 'python /app/security/src/suspicion_detection.py' /app

  advocator:
    build:
      context: ./agents
      dockerfile: advocator/Dockerfile
      target: prod
    network_mode: host
    volumes:
      - ./agents/advocator/src:/app/advocator/src
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    environment:
      - PYTHONUNBUFFERED=1
      - AGENT_NAME
      - AGENT_ROLE=Advocator


  language-test:
    build:
      context: ./agents
      dockerfile: language/Dockerfile
      target: test
    container_name: halo-language-test
    environment:
      - CLAUDE_key
    volumes:
      - ./agents/language/src:/app/src
      - ./agents/language/test:/app/test

  generic:
    build:
      context: ./agents
      dockerfile: generic/Dockerfile
      target: prod
    deploy:
      replicas: 5
    network_mode: host
    environment:
      - PYTHONUNBUFFERED=1
      - AGENT_NAME=LivingRoomLight
      - AGENT_ROLE=Actuator

  dishwasher:
    build:
      context: ./agents
      dockerfile: generic/Dockerfile
      target: prod
    network_mode: host
    environment:
      - PYTHONUNBUFFERED=1
      - AGENT_NAME=Dishwasher
      - AGENT_ROLE=Actuator

  security_cam:
    build:
      context: ./agents
      dockerfile: generic/Dockerfile
      target: prod
    network_mode: host
    environment:
      - PYTHONUNBUFFERED=1
      - AGENT_NAME=SecurityCam
      - AGENT_ROLE=Actuator

  livingroomtv:
    build:
      context: ./agents
      dockerfile: generic/Dockerfile
      target: tv
    network_mode: host
    volumes:
      - ./agents/generic/src:/app/generic/src
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    environment:
      - PYTHONUNBUFFERED=1
      - AGENT_NAME=LivingRoomTV
      - AGENT_ROLE=Actuator
    command: python -m watchfiles 'python /app/generic/src/tcltv.py' /app

  stream:
    build:
      context: ./agents
      dockerfile: generic/Dockerfile
      target: stream
    network_mode: host
    volumes:
      - ./agents/generic/src:/app/generic/src
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    environment:
      - PYTHONUNBUFFERED=1
      - AGENT_NAME=StreamingAggregator
      - AGENT_ROLE=Aggregator
    command: python -m watchfiles 'python /app/generic/src/streaming_agg.py' /app

  weather:
    build:
      context: ./agents
      dockerfile: generic/Dockerfile
      target: weather
    network_mode: host
    volumes:
      - ./agents/generic/src:/app/generic/src
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    environment:
      - PYTHONUNBUFFERED=1
      - AGENT_NAME=WEatherAggregator
      - AGENT_ROLE=Aggregator
    command: python -m watchfiles 'python /app/generic/src/weather.py' /app
  
  generic-test:
    build:
      context: ./agents
      dockerfile: generic/Dockerfile
      target: test
    container_name: halo-generic-test
    volumes:
      - ./agents/generic/src:/app/src
      - ./agents/generic/test:/app/test
      - ./agents/db:/app/db

  bootstrap:
    build:
      context: ./agents
      dockerfile: bootstrap/Dockerfile
      target: prod
    container_name: halo-bootstrap
    network_mode: host
  
  bootstrap-test:
    build:
      context: ./agents
      dockerfile: bootstrap/Dockerfile
      target: test
    container_name: halo-bootstrap-test
    volumes:
      - ./agents/bootstrap/src:/app/bootstrap/src
      - ./agents/bootstrap/test:/app/bootstrap/test
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db

  discovery-test:
    build:
      context: ./agents
      dockerfile: discovery/Dockerfile
      target: test
    container_name: halo-discovery-test
    volumes:
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/discovery/test:/app/discovery/test
      - ./agents/db:/app/db

  discovery-verify:
    build:
      context: ./agents
      dockerfile: discovery/Dockerfile
      target: verify
    container_name: halo-discovery
    volumes:
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/db:/app/db
    stdin_open: true
    tty: true

  halo-watchdog:
    build: 
      context: .
      dockerfile: agents/watchdog/Dockerfile
      target: prod
    container_name: halo-watchdog
    network_mode: "host"
    restart: unless-stopped
    volumes:
      # THE WORMHOLE: Gives the container God-mode over the host's Docker daemon
      - /var/run/docker.sock:/var/run/docker.sock 
      
      # Optional: Hot-reload mounts for development
      - ./agents/discovery/src:/app/discovery/src
      - ./agents/watchdog/src:/app/watchdog/src
      - ./agents/db:/app/db

  docs:
    build:
      context: .
      dockerfile: docs/Dockerfile
    container_name: halo-docs
    ports:
      - "8000:8000"
    command: serve -a 0.0.0.0:8000
    volumes:
      - ./:/docs
  
  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dozzle_data:/data
    ports:
      - 8080:8080
volumes:
  dozzle_data:
      
